<!-- Write a JS to store an array of objects having height and name. 
display name and height of person with highest height. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>
    obj = [{ name: "abc", hight: 5.9 }, { name: "xyz", hight: 5.8 }, { name: "pqr", hight: 7.0 }]
    a = obj.sort((a, b) => b.hight - a.hight)
    console.log(a[0].name + " " + a[0].hight)

</script>
